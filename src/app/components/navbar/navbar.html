<nav class="site-nav" aria-label="Primary navigation">
  <a class="brand" href="#top" aria-label="Sai Charan home">Sai Charan</a>

  <div class="nav-links">
    @for (link of navLinks; track link.label) {
      <a
        [class.resume-link]="link.highlighted"

      >
        {{ link.label }}
      </a>
    }
  </div>
</nav>
